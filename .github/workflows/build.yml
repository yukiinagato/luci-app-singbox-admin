name: Build

on:
  workflow_dispatch:
  push:
    branches:
      - '**'
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Inject Version
        run: |
          # 1. 获取最近的标签作为基准
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.1")
          BASE_VER=$(echo "$LATEST_TAG" | sed 's/^v//')
          
          # 2. 获取时间戳和短哈希
          TIMESTAMP=$(date +%Y%m%d%H%M)
          SHORT_SHA=$(git rev-parse --short HEAD)

          # 3. 清洗分支名：将 / 替换为 -
          # 这一步解决了你遇到的报错
          SAFE_REF=$(echo "${{ github.ref_name }}" | sed 's/\//-/g')
          echo "SAFE_REF=$SAFE_REF" >> $GITHUB_ENV

          # 4. 根据触发类型决定最终版本号
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            RAW_VER=$(echo "${{ github.ref_name }}" | sed 's/^v//')
            FINAL_VER="${RAW_VER}-1"
          else
            FINAL_VER="${BASE_VER}-git-${TIMESTAMP}-${SHORT_SHA}"
          fi
          
          echo "FINAL_VER=$FINAL_VER" >> $GITHUB_ENV
          sed -i "s/Version: .*/Version: $FINAL_VER/" control

      - name: Build IPK
        run: |
          mkdir -p ipk_root/CONTROL
          [ -f "control" ] && cp control ipk_root/CONTROL/
          [ -d "root" ] && cp -r root/* ipk_root/
          chmod -R 755 ipk_root/
          wget https://raw.githubusercontent.com/openwrt/openwrt/master/scripts/ipkg-build
          chmod +x ipkg-build
          ./ipkg-build ipk_root .

      - name: Collect Artifacts
        run: |
          mkdir -p artifacts
          mv *.ipk artifacts/luci-app-singbox-admin_${{ env.FINAL_VER }}_all.ipk

      - name: Upload to Actions
        uses: actions/upload-artifact@v4
        with:
          name: ipk-${{ github.ref_name }}-${{ env.FINAL_VER }}
          path: artifacts/*.ipk

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ipk-*
          path: artifacts
          merge-multiple: true

      - name: Create/Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || 'latest' }}
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') }}
          files: artifacts/*.ipk
          make_latest: true
          generate_release_notes: true
