name: Build luci-app-singbox-admin

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare dependencies (Modern Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses5-dev libssl-dev python3-setuptools python3-dev rsync unzip zlib1g-dev file wget
          python3 -m pip install --user --upgrade setuptools --break-system-packages

      - name: Cache SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: sdk
          key: sdk-x86-64-23.05.5

      - name: Download OpenWrt SDK (x86_64)
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          set -e
          SDK_URL="https://downloads.openwrt.org/releases/23.05.5/targets/x86/64/openwrt-sdk-23.05.5-x86-64_gcc-12.3.0_musl.Linux-x86_64.tar.xz"
          wget -O sdk.tar.xz "$SDK_URL"
          tar -xf sdk.tar.xz
          mv openwrt-sdk-* sdk

      - name: Copy package into SDK
        run: |
          chmod -R 755 .
          mkdir -p sdk/package/luci-app-singbox-admin
          rsync -a --exclude 'sdk' --exclude '.git' --exclude '.github' ./ sdk/package/luci-app-singbox-admin/

      - name: Build package
        run: |
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install luci-base
          ./scripts/feeds install sing-box
          echo "CONFIG_PACKAGE_luci-app-singbox-admin=y" >> .config
          make defconfig
          make package/luci-app-singbox-admin/compile V=s

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          find sdk/bin/packages -type f -name "*luci-app-singbox-admin*.ipk" -exec cp -v {} artifacts/ \;

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-singbox-admin-x86_64-ipk
          path: artifacts/*.ipk
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: luci-app-singbox-admin-x86_64-ipk
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.ipk
          generate_release_notes: true
