name: Build luci-app-singbox-admin

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget

      - name: Download OpenWrt SDK (x86_64)
        run: |
          set -e
          SDK_URL="https://downloads.openwrt.org/releases/23.05.5/targets/x86/64/openwrt-sdk-23.05.5-x86-64_gcc-12.3.0_musl.Linux-x86_64.tar.xz"
          wget -O sdk.tar.xz "$SDK_URL"
          tar -xf sdk.tar.xz
          mv openwrt-sdk-* sdk

      - name: Copy package into SDK
        run: |
          mkdir -p sdk/package/luci-app-singbox-admin
          rsync -a --exclude sdk --exclude .git ./ sdk/package/luci-app-singbox-admin/

      - name: Build package
        run: |
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install luci-base || true
          make defconfig
          make package/luci-app-singbox-admin/compile V=s

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          find sdk/bin/packages -type f -name "*luci-app-singbox-admin*.ipk" -exec cp -v {} artifacts/ \;

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-singbox-admin-x86_64-ipk
          path: artifacts/*.ipk
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: luci-app-singbox-admin-x86_64-ipk
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.ipk
          generate_release_notes: true
