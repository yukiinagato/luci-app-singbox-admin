name: Build

on:
  workflow_dispatch:
  push:
    branches:
      - '**'
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Inject Version
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.1")
          BASE_VER=$(echo "$LATEST_TAG" | sed 's/^v//')
          
          TIMESTAMP=$(date +%Y%m%d%H%M)
          SHORT_SHA=$(git rev-parse --short HEAD)

          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            RAW_VER=$(echo "${{ github.ref_name }}" | sed 's/^v//')
            FINAL_VER="${RAW_VER}-1"
          else
            FINAL_VER="${BASE_VER}-git-${TIMESTAMP}-${SHORT_SHA}"
          fi
          
          echo "Final Version: $FINAL_VER"
          echo "FINAL_VER=$FINAL_VER" >> $GITHUB_ENV
          
          if [ -f "control" ]; then
            sed -i "s/Version: .*/Version: $FINAL_VER/" control
          fi

      - name: Build IPK
        run: |
          mkdir -p ipk_root/CONTROL
          
          if [ -f "control" ]; then
            cp control ipk_root/CONTROL/
          fi
          
          if [ -d "root" ]; then
            cp -r root/* ipk_root/
          fi
          
          chmod -R 755 ipk_root/
          
          wget https://raw.githubusercontent.com/openwrt/openwrt/master/scripts/ipkg-build
          chmod +x ipkg-build
          ./ipkg-build ipk_root .

      - name: Collect Artifacts
        run: |
          mkdir -p artifacts
          for f in *.ipk; do
            mv "$f" "artifacts/luci-app-singbox-admin_${{ env.FINAL_VER }}_all.ipk"
          done

      - name: Upload to Actions
        uses: actions/upload-artifact@v4
        with:
          name: ipk-${{ github.ref_name }}-${{ env.FINAL_VER }}
          path: artifacts/*.ipk

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ipk-*
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.ipk
          generate_release_notes: true
