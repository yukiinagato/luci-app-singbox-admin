name: Build

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            RAW_VER=$(echo "${{ github.ref_name }}" | sed 's/^v//')
            echo "Injecting version $RAW_VER into control"
            sed -i "s/Version: .*/Version: $RAW_VER-1/" control
          fi

      - name: Build IPK
        run: |
          mkdir -p ipk_root/CONTROL
          
          cp control ipk_root/CONTROL/
          
          cp -r root/* ipk_root/
          
          chmod -R 755 ipk_root/
          
          wget https://raw.githubusercontent.com/openwrt/openwrt/master/scripts/ipkg-build
          chmod +x ipkg-build
          ./ipkg-build ipk_root .

      - name: Collect Artifacts
        run: |
          mkdir -p artifacts
          mv *.ipk artifacts/

      - name: Upload to Actions
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-singbox-admin-x86_64-ipk
          path: artifacts/*.ipk

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: luci-app-singbox-admin-x86_64-ipk
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.ipk
          generate_release_notes: true
